# Allowealth Docker Compose — production deployment (pre-built image)
name: allowealth
# Usage:
#   cp docker/.env.example .env
#   # Edit .env — set every required production value from docker/.env.example
#   docker compose -f docker/docker-compose.prod.yml pull
#   docker compose -f docker/docker-compose.prod.yml up -d
#
# To update to the latest image:
#   docker compose -f docker/docker-compose.prod.yml pull
#   docker compose -f docker/docker-compose.prod.yml up -d

services:
  app:
    container_name: allowealth-app
    # Defaults to :latest. Pin a release by setting APP_IMAGE_TAG, e.g.:
    #   APP_IMAGE_TAG=v0.29.8 docker compose -f docker/docker-compose.prod.yml up -d
    image: ghcr.io/ivankristianto/allowealth:${APP_IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      - redis
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    volumes:
      - allowealth-data:/data
    env_file: ../.env
    environment:
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-changeme}@redis:6379}
      # Ensure the standalone server binds on all interfaces inside the container
      # (overrides any DEV_HOST that may have been baked in at build time)
      HOST: '0.0.0.0'
      # Override dev values from .env for container context
      DATABASE_URL: /data/allowealth.db
      PORT: ${PORT:-3000}
      # Set to your production URL (e.g., https://finances.example.com)
      # Defaults to localhost for local Docker testing
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 256M

  redis:
    image: redis:7.4-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Required for Redis entrypoint to switch from root to redis user via gosu
      - SETUID
      - SETGID
      - CHOWN
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  allowealth-data:
    name: allowealth-data
    # Named volume persists the SQLite database at /data/allowealth.db across
    # container restarts and image updates.
  redis-data:
    name: redis-data
