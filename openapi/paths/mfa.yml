# Better Auth two-factor endpoint paths
paths:
  /api/auth/two-factor/enable:
    post:
      tags: [Authentication]
      operationId: enableTwoFactor
      summary: Start two-factor setup
      description: |
        Requires an authenticated session and password confirmation.
        Returns the TOTP URI plus the first set of backup codes.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                issuer:
                  type: string
                  example: Allowealth
      responses:
        '200':
          description: Two-factor setup initialized
          content:
            application/json:
              schema:
                type: object
                required: [totpURI, backupCodes]
                properties:
                  totpURI:
                    type: string
                    description: otpauth:// URI for authenticator apps
                  backupCodes:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '../responses/common.yml#/Unauthorized'

  /api/auth/two-factor/verify-totp:
    post:
      tags: [Authentication]
      operationId: verifyTotp
      summary: Verify a TOTP code
      description: |
        Used both to finish setup and to complete a sign-in that is paused for
        two-factor verification.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  example: '123456'
                trustDevice:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Verification accepted and session completed or updated
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    required: [id, email, name]
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                        format: email
                      name:
                        type: string
                      twoFactorEnabled:
                        type: boolean
        '400':
          description: Invalid verification code or missing challenge state
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'

  /api/auth/two-factor/verify-backup-code:
    post:
      tags: [Authentication]
      operationId: verifyBackupCode
      summary: Verify a backup code
      description: Completes a two-factor challenge using a one-time backup code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                trustDevice:
                  type: boolean
                  default: false
                disableSession:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Verification accepted and session completed or updated
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token:
                    type: [string, 'null']
                  user:
                    type: object
                    required: [id, email, name]
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                        format: email
                      name:
                        type: string
                      twoFactorEnabled:
                        type: boolean
        '400':
          description: Invalid verification code or missing challenge state
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'

  /api/auth/two-factor/disable:
    post:
      tags: [Authentication]
      operationId: disableTwoFactor
      summary: Disable two-factor authentication
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Two-factor disabled
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: boolean
                    example: true
        '401':
          $ref: '../responses/common.yml#/Unauthorized'

  /api/auth/two-factor/generate-backup-codes:
    post:
      tags: [Authentication]
      operationId: generateBackupCodes
      summary: Generate a new set of backup codes
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: New backup codes generated
          content:
            application/json:
              schema:
                type: object
                required: [backupCodes]
                properties:
                  backupCodes:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
