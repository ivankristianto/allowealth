# Asset Categories endpoint paths
paths:
  /api/asset-categories:
    get:
      tags: [Assets]
      summary: List all asset categories
      description: Retrieve all asset categories for the authenticated user
      security:
        - sessionAuth: []
      parameters:
        - name: isLiability
          in: query
          description: Filter by liability status
          schema:
            type: boolean
        - name: isSystem
          in: query
          description: Filter by system categories
          schema:
            type: boolean
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetCategoriesListResponse.yml#/AssetCategoriesListResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    post:
      tags: [Assets]
      summary: Create a new asset category
      description: Create a new custom asset or liability category
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/CreateAssetCategoryRequest.yml#/CreateAssetCategoryRequest'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetCategoryResponse.yml#/AssetCategoryResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '409':
          description: Category with this name already exists
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/asset-categories/{id}:
    get:
      tags: [Assets]
      summary: Get an asset category by ID
      description: Retrieve a single asset category by its ID
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetCategoryResponse.yml#/AssetCategoryResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    put:
      tags: [Assets]
      summary: Update an asset category
      description: Update an existing asset category
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/UpdateAssetCategoryRequest.yml#/UpdateAssetCategoryRequest'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetCategoryResponse.yml#/AssetCategoryResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '403':
          description: System categories cannot be modified
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '409':
          description: Category with this name already exists
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    delete:
      tags: [Assets]
      summary: Delete an asset category
      description: Delete a custom asset category
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Category deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Category deleted successfully
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '403':
          description: System categories cannot be deleted
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '409':
          description: Category has assets assigned
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
