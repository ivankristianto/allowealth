/forecast:
  get:
    summary: Get forecast reality-check data
    description: >
      Build the forecast reality-check view using the workspace's saved forecast assumptions,
      primary-currency non-debt accounts, monthly actual net savings, a fixed 24-month-forward
      horizon, focused chart window metadata, and yearly grouped breakdown rows.
    operationId: getForecast
    tags:
      - Forecast
    responses:
      '200':
        description: Forecast calculated successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/ForecastResponse.yml'
      '400':
        $ref: '../responses/common.yml#/BadRequest'
      '401':
        $ref: '../responses/common.yml#/Unauthorized'
      '500':
        $ref: '../responses/common.yml#/InternalServerError'
