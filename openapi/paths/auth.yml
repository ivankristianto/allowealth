# Authentication endpoint paths
paths:
  /api/auth/signup:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: Create a new user account with email, password, and name
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/SignupRequest.yml#/SignupRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/AuthSuccessResponse.yml#/AuthSuccessResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Login user
      description: Authenticate user with email and password, creates session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/LoginRequest.yml#/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: Session cookie (HTTP-only, secure)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '../schemas/AuthSuccessResponse.yml#/AuthSuccessResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Logout user
      description: Invalidate current session and clear session cookie
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Logout successful
          headers:
            Set-Cookie:
              description: Blank session cookie to clear existing cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Logged out successfully
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
