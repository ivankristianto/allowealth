# Authentication endpoint paths
paths:
  /api/auth/sign-up/email:
    post:
      tags: [Authentication]
      operationId: signUpEmail
      summary: Register a new user with email and password
      description: |
        Better Auth email sign-up endpoint served by `src/pages/api/auth/[...all].ts`.
        Supports app-owned signup hooks such as invitation checks and workspace bootstrap.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/SignupRequest.yml#/SignupRequest'
      responses:
        '200':
          description: Auth user created and session established
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token:
                    type: [string, 'null']
                    description: Session token when Better Auth returns it in the response body
                  user:
                    type: object
                    required: [id, email, name, emailVerified]
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                        format: email
                      name:
                        type: string
                      image:
                        type: [string, 'null']
                      emailVerified:
                        type: boolean
        '400':
          description: Invalid input or Turnstile verification failed
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '403':
          description: Signup blocked by product policy (for example, invitation required)
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '422':
          description: Validation or Better Auth request error
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'

  /api/auth/sign-in/email:
    post:
      tags: [Authentication]
      operationId: signInEmail
      summary: Sign in with email and password
      description: |
        Better Auth credential sign-in endpoint. The app adds Turnstile verification
        before forwarding the request to Better Auth.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/LoginRequest.yml#/LoginRequest'
      responses:
        '200':
          description: Authentication completed or advanced to a redirect target
          content:
            application/json:
              schema:
                type: object
                required: [redirect, token, user]
                properties:
                  redirect:
                    type: boolean
                    description: Whether the client should follow `url`
                  token:
                    type: string
                    description: Better Auth session token
                  url:
                    type: [string, 'null']
                    description: Redirect target returned by Better Auth
                  user:
                    type: object
                    required: [id, email, name, emailVerified]
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                        format: email
                      name:
                        type: string
                      image:
                        type: [string, 'null']
                      emailVerified:
                        type: boolean
        '400':
          description: Invalid input or Turnstile verification failed
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '403':
          description: Authentication blocked by account or workspace policy
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'

  /api/auth/sign-in/social:
    post:
      tags: [Authentication]
      operationId: signInSocial
      summary: Start social sign-in
      description: |
        Starts the Better Auth social-provider flow. In this app the active provider
        is Google, and Better Auth handles provider state plus the redirect callback.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              properties:
                provider:
                  type: string
                  example: google
                callbackURL:
                  type: string
                  example: /dashboard
                newUserCallbackURL:
                  type: string
                  example: /dashboard
                errorCallbackURL:
                  type: string
                  example: /login
                disableRedirect:
                  type: boolean
                  default: false
                requestSignUp:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Redirect target or direct auth result for the provider flow
          content:
            application/json:
              schema:
                type: object
                required: [redirect]
                properties:
                  redirect:
                    type: boolean
                  url:
                    type: [string, 'null']
                  token:
                    type: [string, 'null']

  /api/auth/callback/{id}:
    get:
      tags: [Authentication]
      operationId: authCallbackGet
      summary: Social provider callback
      description: |
        Better Auth callback endpoint for the provider flow. Google uses
        `/api/auth/callback/google`.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Provider identifier
          schema:
            type: string
            example: google
      responses:
        '302':
          description: Redirects the browser back to the application
          headers:
            Location:
              description: Redirect target chosen by Better Auth
              schema:
                type: string
    post:
      tags: [Authentication]
      operationId: authCallbackPost
      summary: Social provider callback (POST variant)
      description: Some OAuth providers POST their callback payload instead of using GET.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Provider identifier
          schema:
            type: string
            example: google
      responses:
        '302':
          description: Redirects the browser back to the application
          headers:
            Location:
              description: Redirect target chosen by Better Auth
              schema:
                type: string

  /api/auth/sign-out:
    post:
      tags: [Authentication]
      operationId: signOut
      summary: Sign out the current session
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          $ref: '../responses/common.yml#/Unauthorized'

  /api/auth/request-password-reset:
    post:
      tags: [Authentication]
      operationId: requestPasswordReset
      summary: Request a password reset email
      description: |
        Better Auth password-reset request endpoint. The response is intentionally
        generic to avoid revealing whether an email exists.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/ForgotPasswordRequest.yml#/ForgotPasswordRequest'
      responses:
        '200':
          description: Password-reset request accepted
          content:
            application/json:
              schema:
                type: object
                required: [status, message]
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: If an account exists with this email, we've sent a password reset link.
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'

  /api/auth/reset-password:
    post:
      tags: [Authentication]
      operationId: resetPassword
      summary: Complete a password reset
      description: Resets the password with the verified Better Auth reset token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword, token]
              properties:
                newPassword:
                  $ref: '../schemas/Password.yml#/Password'
                token:
                  type: string
                  description: Reset token issued by the Better Auth password-reset flow
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: boolean
                    example: true
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'

  /api/auth/link-social:
    post:
      tags: [Authentication]
      operationId: linkSocialAccount
      summary: Link a social account to the current user
      description: |
        Starts an authenticated Better Auth linking flow from Settings > Security.
        Existing password users must be signed in before linking Google.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              properties:
                provider:
                  type: string
                  example: google
                callbackURL:
                  type: string
                  example: /security
                disableRedirect:
                  type: boolean
                  default: false
                errorCallbackURL:
                  type: string
                  example: /security
      responses:
        '200':
          description: Linking flow started
          content:
            application/json:
              schema:
                type: object
                required: [redirect, url]
                properties:
                  redirect:
                    type: boolean
                  url:
                    type: string
        '401':
          $ref: '../responses/common.yml#/Unauthorized'

  /api/auth/unlink-account:
    post:
      tags: [Authentication]
      operationId: unlinkAccount
      summary: Unlink a provider account
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [providerId]
              properties:
                providerId:
                  type: string
                  example: google
                accountId:
                  type: string
                  description: Optional provider account identifier when multiple accounts exist
      responses:
        '200':
          description: Provider unlinked
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: boolean
                    example: true
        '400':
          description: Unlink rejected by Better Auth safety checks
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'

  /api/auth/verify-email:
    get:
      tags: [Authentication]
      operationId: verifyEmail
      summary: Verify user email
      description: |
        App-owned email verification route. This route is intentionally separate from
        the Better Auth catch-all because the app applies workspace activation and
        post-verification redirects.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: Email verification token from the verification email link
          schema:
            type: string
      responses:
        '302':
          description: Redirects to the login page with the verification result
          headers:
            Location:
              description: Redirect URL to the login page
              schema:
                type: string
                example: /login?verified=true
