# Assets endpoint paths
paths:
  /api/assets:
    get:
      tags: [Assets]
      summary: List all assets
      description: Retrieve all assets for the authenticated user
      security:
        - sessionAuth: []
      parameters:
        - name: type
          in: query
          description: Filter by asset type
          schema:
            type: string
            enum: [cash, bank_account, e_wallet, mutual_fund, bond, crypto, stock, other, credit_card, loan]
        - name: categoryId
          in: query
          description: Filter by asset category ID
          schema:
            type: string
        - name: currency
          in: query
          description: Filter by currency
          schema:
            type: string
            enum: [IDR, USD]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetsListResponse.yml#/AssetsListResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    post:
      tags: [Assets]
      summary: Create a new asset
      description: Create a new asset
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/CreateAssetRequest.yml#/CreateAssetRequest'
      responses:
        '201':
          description: Asset created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetResponse.yml#/AssetResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/assets/{id}:
    get:
      tags: [Assets]
      summary: Get an asset by ID
      description: Retrieve a single asset by its ID
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetResponse.yml#/AssetResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    put:
      tags: [Assets]
      summary: Update an asset
      description: Update an existing asset (name, category, type, or currency)
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/UpdateAssetRequest.yml#/UpdateAssetRequest'
      responses:
        '200':
          description: Asset updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetResponse.yml#/AssetResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    delete:
      tags: [Assets]
      summary: Close an asset (deprecated, use /close)
      description: |
        Closes an asset account (backwards-compatible alias for POST /api/assets/{id}/close).
        Requires zero balance. Prefer using the dedicated close endpoint.
      deprecated: true
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Asset closed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Asset closed successfully
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/assets/{id}/balance:
    post:
      tags: [Assets]
      summary: Update asset balance
      description: Update an asset's balance (creates history entry)
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/UpdateAssetBalanceRequest.yml#/UpdateAssetBalanceRequest'
      responses:
        '200':
          description: Asset balance updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetResponse.yml#/AssetResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/assets/transfer:
    post:
      tags: [Assets]
      summary: Transfer balance between assets
      description: Transfer balance from one asset to another of the same currency
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fromAssetId, toAssetId, amount]
              properties:
                fromAssetId:
                  type: string
                  description: Source asset ID
                toAssetId:
                  type: string
                  description: Destination asset ID (must differ from source)
                amount:
                  type: string
                  description: Transfer amount (must be positive)
                notes:
                  type: string
                  maxLength: 500
                  description: Optional transfer notes
      responses:
        '200':
          description: Transfer completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      fromAsset:
                        $ref: '../schemas/AssetResponse.yml#/AssetResponse'
                      toAsset:
                        $ref: '../schemas/AssetResponse.yml#/AssetResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/assets/{id}/history:
    get:
      tags: [Assets]
      summary: Get asset balance history
      description: Retrieve balance history for an asset
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
        - name: limit
          in: query
          description: Maximum number of history entries to return (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetHistoryListResponse.yml#/AssetHistoryListResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/assets/closed:
    get:
      tags: [Assets]
      summary: List closed assets
      description: Retrieve all closed asset accounts for the authenticated workspace
      security:
        - sessionAuth: []
      parameters:
        - name: type
          in: query
          description: Filter by asset type
          schema:
            type: string
            enum: [cash, bank_account, e_wallet, mutual_fund, bond, crypto, stock, other, credit_card, loan]
        - name: currency
          in: query
          description: Filter by currency
          schema:
            type: string
            enum: [IDR, USD]
      responses:
        '200':
          description: List of closed assets
          content:
            application/json:
              schema:
                $ref: '../schemas/AssetsListResponse.yml#/AssetsListResponse'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/assets/{id}/close:
    post:
      tags: [Assets]
      summary: Close an asset account
      description: |
        Closes an asset account. Requires zero balance.
        Once closed, the account is hidden from active views but transaction history is preserved.
        Can be reopened later by an admin.
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Account closed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      asset:
                        $ref: '../schemas/Asset.yml#/Asset'
                      message:
                        type: string
                        example: Account closed successfully
        '400':
          description: Balance not zero or account already closed
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/assets/{id}/reopen:
    post:
      tags: [Assets]
      summary: Reopen a closed asset account
      description: |
        Reopens a previously closed account. Admin only.
        The account will be restored to the active accounts list.
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Account reopened successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      asset:
                        $ref: '../schemas/Asset.yml#/Asset'
                      message:
                        type: string
                        example: Account reopened successfully
        '400':
          description: Account is not closed
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '403':
          description: Insufficient permissions (admin only)
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
