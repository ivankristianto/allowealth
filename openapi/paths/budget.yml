# Budget endpoint paths
paths:
  /api/budget/overview:
    get:
      tags: [Budget]
      summary: Get budget overview
      description: |
        Retrieve budget overview for a specific month.

        Supports both JSON (default) and HTML response formats for the Interactive Page Architecture pattern.
        When requesting HTML (`_render=html`), the response contains server-rendered HTML fragments
        that can be injected directly into the DOM.
      security:
        - sessionAuth: []
      parameters:
        - name: year
          in: query
          description: Year (defaults to current year)
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - name: month
          in: query
          description: Month (1-12, defaults to current month)
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: currency
          in: query
          description: Currency (defaults to IDR)
          schema:
            type: string
            enum: [IDR, USD, SGD, PHP, EUR, GBP, MYR, THB, JPY, AUD, KRW, INR]
            default: IDR
        - name: _render
          in: query
          description: Response format (json or html)
          schema:
            type: string
            enum: [json, html]
            default: json
        - name: _partial
          in: query
          description: |
            Which partial(s) to render when using HTML format.
            Only applicable when _render=html.
            - summary: Budget summary section
            - cards: Budget cards grid
            - advice: AI advice banner
            - all: All partials (default)
          schema:
            type: string
            enum: [summary, cards, advice, all]
            default: all
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/BudgetOverviewResponse.yml#/BudgetOverviewResponse'
            text/html:
              schema:
                type: string
                description: |
                  Server-rendered HTML fragments with PARTIAL markers.
                  Each partial is prefixed with a comment marker (e.g., `<!-- PARTIAL:summary -->`).
                example: |
                  <!-- PARTIAL:summary -->
                  <section class="bg-base-100 rounded-card...">...</section>

                  <!-- PARTIAL:cards -->
                  <div class="grid grid-cols-1 md:grid-cols-2...">...</div>

                  <!-- PARTIAL:advice -->
                  <aside class="bg-info/5 border...">...</aside>
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/budget/history:
    get:
      tags: [Budget]
      summary: Get budget history
      description: Retrieve budget history for multiple months with category breakdowns
      security:
        - sessionAuth: []
      parameters:
        - name: currency
          in: query
          description: Currency (defaults to IDR)
          schema:
            type: string
            enum: [IDR, USD, SGD, PHP, EUR, GBP, MYR, THB, JPY, AUD, KRW, INR]
            default: IDR
        - name: months
          in: query
          description: Number of months to retrieve (1-24, default 12)
          schema:
            type: integer
            minimum: 1
            maximum: 24
            default: 12
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/BudgetHistoryResponse.yml#/BudgetHistoryResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/budget/category/{id}/remaining:
    get:
      tags: [Budget]
      summary: Get category remaining budget
      description: Retrieve remaining budget for a specific category in current month
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/CategoryRemainingResponse.yml#/CategoryRemainingResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/budget/import:
    post:
      tags: [Budget]
      summary: Import budgets from CSV
      description: Import budgets from a CSV file with category and budget_amount columns
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [csv_file, month, year, currency]
              properties:
                csv_file:
                  type: string
                  format: binary
                  description: CSV file with "category" and "budget_amount" columns
                overwrite:
                  type: string
                  enum: ['true', 'false']
                  default: 'false'
                  description: Whether to overwrite existing budgets for the month
                month:
                  type: integer
                  minimum: 1
                  maximum: 12
                  description: Target month
                year:
                  type: integer
                  minimum: 2000
                  maximum: 2100
                  description: Target year
                currency:
                  type: string
                  enum: [IDR, USD, SGD, PHP, EUR, GBP, MYR, THB, JPY, AUD, KRW, INR]
                  description: Target currency
      responses:
        '200':
          description: Import completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      imported:
                        type: integer
                        description: Number of budgets imported
                      skipped:
                        type: integer
                        description: Number of budgets skipped (already exist)
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            row:
                              type: integer
                            message:
                              type: string
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/budget/export:
    get:
      tags: [Budget]
      summary: Export budget overview to CSV
      description: Export budget overview for a specific month to CSV file with category breakdowns.
      security:
        - sessionAuth: []
      parameters:
        - name: year
          in: query
          description: Year (defaults to current year)
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - name: month
          in: query
          description: Month (1-12, defaults to current month)
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: currency
          in: query
          description: Currency (defaults to IDR)
          schema:
            type: string
            enum: [IDR, USD, SGD, PHP, EUR, GBP, MYR, THB, JPY, AUD, KRW, INR]
            default: IDR
      responses:
        '200':
          description: CSV file generated successfully
          headers:
            Content-Type:
              description: CSV file content type
              schema:
                type: string
                example: text/csv; charset=utf-8
            Content-Disposition:
              description: File download attachment with filename
              schema:
                type: string
                example: 'attachment; filename="budget_2024_Jan.csv"'
          content:
            text/csv:
              schema:
                type: string
                example: |
                  category_name,budget_amount,expense_amount,balance,percentage,status
                  Food,5000000.00,3500000.00,1500000.00,70.0,ok
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
