# Transactions endpoint paths
paths:
  /api/transactions:
    get:
      tags: [Transactions]
      summary: List all transactions
      description: Retrieve paginated list of transactions with optional filters
      security:
        - sessionAuth: []
      parameters:
        - name: type
          in: query
          description: Filter by transaction type
          schema:
            type: string
            enum: [expense, income]
        - name: category_id
          in: query
          description: Filter by category ID
          schema:
            type: string
        - name: account_id
          in: query
          description: Filter by account ID
          schema:
            type: string
        - name: user_id
          in: query
          description: Optional workspace member user ID filter
          schema:
            type: string
        - name: currency
          in: query
          description: Filter by currency
          schema:
            type: string
            enum: [IDR, USD]
        - name: start_date
          in: query
          description: Filter by start date (ISO 8601)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Filter by end date (ISO 8601)
          schema:
            type: string
            format: date
        - name: search
          in: query
          description: Search in transaction description
          schema:
            type: string
        - name: category_ids
          in: query
          description: |
            Filter by multiple category IDs (comma-separated).
            Example: `category_ids=cat1,cat2,cat3`
          schema:
            type: string
            example: cat1,cat2,cat3
        - name: limit
          in: query
          description: Number of results per page (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          description: Number of results to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/TransactionsListResponse.yml#/TransactionsListResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    post:
      tags: [Transactions]
      summary: Create a new transaction
      description: Create a new income or expense transaction
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/CreateTransactionRequest.yml#/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/TransactionResponse.yml#/TransactionResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get a transaction by ID
      description: Retrieve a single transaction by its ID
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/TransactionResponse.yml#/TransactionResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    put:
      tags: [Transactions]
      summary: Update a transaction
      description: Update an existing transaction (all fields optional)
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/UpdateTransactionRequest.yml#/UpdateTransactionRequest'
      responses:
        '200':
          description: Transaction updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/TransactionResponse.yml#/TransactionResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    delete:
      tags: [Transactions]
      summary: Delete a transaction
      description: Soft delete a transaction (marks as deleted, doesn't remove record)
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Transaction deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Transaction deleted successfully
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/transactions/{id}/history:
    get:
      tags: [Transactions]
      summary: Get transaction audit history
      description: Retrieve create, update, and delete audit events for a transaction
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
        - name: all
          in: query
          description: Return all update events (default returns the latest 5 updates)
          schema:
            type: boolean
        - name: _render
          in: query
          description: Response format (json or server-rendered html fragment)
          schema:
            type: string
            enum: [json, html]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/TransactionHistoryResponse.yml#/TransactionHistoryResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/transactions/export:
    get:
      tags: [Transactions]
      summary: Export transactions to CSV
      description: Export transactions to CSV file with optional filters. Returns a downloadable CSV file with all matching transactions.
      security:
        - sessionAuth: []
      parameters:
        - name: type
          in: query
          description: Filter by transaction type
          schema:
            type: string
            enum: [expense, income]
        - name: category_id
          in: query
          description: Filter by category ID
          schema:
            type: string
        - name: payment_method_id
          in: query
          description: Filter by payment method ID
          schema:
            type: string
        - name: currency
          in: query
          description: Filter by currency
          schema:
            type: string
            enum: [IDR, USD]
        - name: start_date
          in: query
          description: Filter by start date (ISO 8601)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Filter by end date (ISO 8601)
          schema:
            type: string
            format: date
        - name: search
          in: query
          description: Search in transaction description
          schema:
            type: string
      responses:
        '200':
          description: CSV file generated successfully
          headers:
            Content-Type:
              description: CSV file content type
              schema:
                type: string
                example: text/csv; charset=utf-8
            Content-Disposition:
              description: File download attachment with filename
              schema:
                type: string
                example: 'attachment; filename="transactions_2024-01-15.csv"'
          content:
            text/csv:
              schema:
                type: string
                example: |
                  date,type,amount,currency,category,payment_method,description
                  2024-01-15,expense,50.00,IDR,Food,Cash,Lunch
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/transactions/import:
    post:
      tags: [Transactions]
      summary: Import transactions from CSV
      description: |
        Import transactions from a CSV file with custom column mapping.

        **CSV Format Requirements:**
        - Must be a valid CSV file with headers
        - Must contain at least one data row
        - Supports quoted fields and escaped quotes

        **Column Mapping:**
        The endpoint accepts column mapping parameters to map CSV columns to database fields:
        - `map_date`: Date column (YYYY-MM-DD format)
        - `map_type`: Type column (expense/income)
        - `map_amount`: Amount column (numeric value)
        - `map_currency`: Currency column (IDR/USD)
        - `map_category`: Category column (category name)
        - `map_payment_method`: Payment method column (payment method name)
        - `map_description`: Description column (optional notes)

        **Import Result:**
        Returns counts of successfully imported transactions, skipped transactions,
        and validation errors for failed rows.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - csv_file
              properties:
                csv_file:
                  type: string
                  format: binary
                  description: CSV file to import
                map_date:
                  type: string
                  description: CSV column name for date field
                  example: date
                map_type:
                  type: string
                  description: CSV column name for type field
                  example: type
                map_amount:
                  type: string
                  description: CSV column name for amount field
                  example: amount
                map_currency:
                  type: string
                  description: CSV column name for currency field
                  example: currency
                map_category:
                  type: string
                  description: CSV column name for category field
                  example: category
                map_payment_method:
                  type: string
                  description: CSV column name for payment method field
                  example: payment_method
                map_description:
                  type: string
                  description: CSV column name for description field
                  example: description
      responses:
        '200':
          description: Import completed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      success:
                        type: boolean
                        example: true
                      data:
                        type: object
                        required: [message, result]
                        properties:
                          message:
                            type: string
                            example: Import completed
                          result:
                            $ref: '../schemas/TransactionImportResult.yml#/TransactionImportResult'
        '400':
          description: Bad request - invalid CSV or mapping
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
              examples:
                missingFile:
                  summary: CSV file not provided
                  value:
                    success: false
                    error:
                      message: CSV file is required
                      code: INVALID_INPUT
                invalidFormat:
                  summary: Not a CSV file
                  value:
                    success: false
                    error:
                      message: File must be a CSV
                      code: INVALID_INPUT
                emptyFile:
                  summary: CSV file has no data
                  value:
                    success: false
                    error:
                      message: CSV file must contain at least a header row and one data row
                      code: INVALID_INPUT
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
