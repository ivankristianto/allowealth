paths:
  /api/recurring:
    get:
      tags: [Recurring]
      summary: List recurring templates
      description: Retrieve recurring templates for the authenticated workspace
      security:
        - sessionAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by template status
          schema:
            type: string
            enum: [active, paused, completed, cancelled, all]
            default: all
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of templates per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: _render
          in: query
          description: Response mode (`html` returns server-rendered partial)
          schema:
            type: string
            enum: [json, html]
      responses:
        '200':
          description: Recurring templates response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        type: object
                        required: [templates, total, page, limit]
                        properties:
                          templates:
                            type: array
                            items:
                              $ref: '../schemas/RecurringTemplate.yml#/RecurringTemplate'
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
            text/html:
              schema:
                type: string
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    post:
      tags: [Recurring]
      summary: Create recurring template
      description: Create a recurring template and generate initial pending occurrences
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  name,
                  type,
                  amount,
                  currency,
                  category_id,
                  account_id,
                  day_of_month,
                  start_date,
                ]
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [expense, income]
                amount:
                  type: string
                currency:
                  type: string
                  enum: [IDR, USD, SGD, PHP, EUR, GBP, MYR, THB, JPY, AUD, KRW, INR]
                category_id:
                  type: string
                account_id:
                  type: string
                day_of_month:
                  type: integer
                  minimum: 1
                  maximum: 31
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                total_occurrences:
                  type: integer
                  minimum: 1
                is_installment:
                  type: boolean
                installment_label:
                  type: string
                starting_occurrence_number:
                  type: integer
                  minimum: 1
                description:
                  type: string
                status:
                  type: string
                  enum: [active, paused, completed, cancelled]
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        $ref: '../schemas/RecurringTemplate.yml#/RecurringTemplate'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/recurring/{id}:
    get:
      tags: [Recurring]
      summary: Get recurring template by ID
      description: Retrieve a recurring template with its occurrence history
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Recurring template detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        allOf:
                          - $ref: '../schemas/RecurringTemplate.yml#/RecurringTemplate'
                          - type: object
                            required: [occurrences]
                            properties:
                              occurrences:
                                type: array
                                items:
                                  $ref: '../schemas/RecurringOccurrence.yml#/RecurringOccurrence'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    put:
      tags: [Recurring]
      summary: Update recurring template
      description: Update mutable fields of an existing recurring template
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [expense, income]
                amount:
                  type: string
                currency:
                  type: string
                  enum: [IDR, USD, SGD, PHP, EUR, GBP, MYR, THB, JPY, AUD, KRW, INR]
                category_id:
                  type: string
                account_id:
                  type: string
                day_of_month:
                  type: integer
                  minimum: 1
                  maximum: 31
                start_date:
                  type: string
                  format: date
                end_date:
                  type: string
                  format: date
                total_occurrences:
                  type: integer
                  minimum: 1
                is_installment:
                  type: boolean
                installment_label:
                  type: string
                starting_occurrence_number:
                  type: integer
                  minimum: 1
                description:
                  type: string
                status:
                  type: string
                  enum: [active, paused, completed, cancelled]
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        $ref: '../schemas/RecurringTemplate.yml#/RecurringTemplate'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    delete:
      tags: [Recurring]
      summary: Delete recurring template
      description: Permanently delete a recurring template and cascaded occurrences
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '204':
          description: Template deleted successfully
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/recurring/{id}/pause:
    post:
      tags: [Recurring]
      summary: Pause recurring template
      description: Set recurring template status to paused
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Template paused
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        $ref: '../schemas/RecurringTemplate.yml#/RecurringTemplate'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/recurring/{id}/resume:
    post:
      tags: [Recurring]
      summary: Resume recurring template
      description: Set recurring template status back to active
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Template resumed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        $ref: '../schemas/RecurringTemplate.yml#/RecurringTemplate'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/recurring/{id}/cancel:
    post:
      tags: [Recurring]
      summary: Cancel recurring template
      description: Cancel a recurring template and remove future pending occurrences
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Template cancelled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        $ref: '../schemas/RecurringTemplate.yml#/RecurringTemplate'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/recurring/occurrences:
    get:
      tags: [Recurring]
      summary: List recurring occurrences
      description: Retrieve recurring occurrences with month/status filters
      security:
        - sessionAuth: []
      parameters:
        - name: month
          in: query
          description: Month in YYYY-MM format
          schema:
            type: string
            pattern: '^\\d{4}-\\d{2}$'
        - name: status
          in: query
          description: Filter by occurrence status
          schema:
            type: string
            enum: [pending, confirmed, skipped, all]
            default: pending
        - name: due_within
          in: query
          description: Filter due date within N days (for example 7d)
          schema:
            type: string
            pattern: '^\\d+d$'
            example: 7d
        - name: _render
          in: query
          description: Response mode (`html` returns server-rendered partial)
          schema:
            type: string
            enum: [json, html]
      responses:
        '200':
          description: Recurring occurrences response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        type: object
                        required: [occurrences, total]
                        properties:
                          occurrences:
                            type: array
                            items:
                              $ref: '../schemas/RecurringOccurrence.yml#/RecurringOccurrence'
                          total:
                            type: integer
            text/html:
              schema:
                type: string
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/recurring/occurrences/{id}/confirm:
    post:
      tags: [Recurring]
      summary: Confirm recurring occurrence
      description: Confirm an occurrence and create the corresponding transaction
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/ConfirmOccurrenceRequest.yml#/ConfirmOccurrenceRequest'
      responses:
        '201':
          description: Occurrence confirmed and transaction created
          content:
            application/json:
              schema:
                $ref: '../schemas/TransactionResponse.yml#/TransactionResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '409':
          description: Occurrence already confirmed/skipped or template not active
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/recurring/occurrences/{id}/skip:
    post:
      tags: [Recurring]
      summary: Skip recurring occurrence
      description: Mark an occurrence as skipped with an optional reason
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                skip_reason:
                  type: string
                  maxLength: 200
      responses:
        '200':
          description: Occurrence skipped
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        $ref: '../schemas/RecurringOccurrence.yml#/RecurringOccurrence'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '409':
          description: Occurrence already confirmed/skipped
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/recurring/calendar:
    get:
      tags: [Recurring]
      summary: Get recurring calendar data
      description: Retrieve recurring occurrences grouped by date for calendar view
      security:
        - sessionAuth: []
      parameters:
        - name: year
          in: query
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - name: month
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: _render
          in: query
          description: Response mode (`html` returns server-rendered partial)
          schema:
            type: string
            enum: [json, html]
      responses:
        '200':
          description: Calendar data response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          required: [date, occurrences]
                          properties:
                            date:
                              type: string
                              format: date
                            occurrences:
                              type: array
                              items:
                                $ref: '../schemas/RecurringOccurrence.yml#/RecurringOccurrence'
            text/html:
              schema:
                type: string
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/recurring/stats:
    get:
      tags: [Recurring]
      summary: Get recurring stats
      description: Retrieve pending/overdue/confirmed recurring occurrence metrics
      security:
        - sessionAuth: []
      parameters:
        - name: _render
          in: query
          description: Response mode (`html` returns server-rendered partial)
          schema:
            type: string
            enum: [json, html]
      responses:
        '200':
          description: Recurring stats response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../schemas/ApiErrorResponse.yml#/ApiResponse'
                  - type: object
                    required: [success, data]
                    properties:
                      data:
                        $ref: '../schemas/RecurringStats.yml#/RecurringStats'
            text/html:
              schema:
                type: string
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
