# User endpoint paths
paths:
  /api/user/profile:
    get:
      tags: [User]
      summary: Get user profile
      description: |
        Retrieve the current authenticated user's profile.
        If an email change is in progress, `data.pendingEmail` contains the
        email address awaiting verification.
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/UserProfileResponse.yml#/UserProfileResponse'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

    put:
      tags: [User]
      summary: Update user profile
      description: |
        Update user profile fields.
        When the email is changed, the endpoint starts a verify-first flow:
        it stores `data.pendingEmail` and sends a verification email instead of
        applying the email immediately. Email change validation runs first, so
        if the new email is already used the endpoint returns 409 and no other
        profile updates are persisted.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/UpdateUserProfileRequest.yml#/UpdateUserProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/UserProfileUpdateResponse.yml#/UserProfileUpdateResponse'
        '400':
          description: Validation error or invalid input
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '409':
          description: Email already exists (`EMAIL_ALREADY_EXISTS`)
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
              examples:
                emailAlreadyExists:
                  value:
                    success: false
                    error:
                      message: Email already exists
                      code: EMAIL_ALREADY_EXISTS
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/user/sessions:
    get:
      tags: [User]
      summary: List active sessions
      description: |
        List all active sessions for the authenticated user.
        Current session is returned first. Supports `?_render=html` for
        server-rendered HTML partial.
      security:
        - sessionAuth: []
      parameters:
        - name: _render
          in: query
          required: false
          schema:
            type: string
            enum: [html]
          description: Return server-rendered HTML fragment instead of JSON
      responses:
        '200':
          description: Sessions listed successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/SessionListResponse.yml#/SessionListResponse'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

    delete:
      tags: [User]
      summary: Revoke a single session
      description: |
        Revoke a single non-current session by ID. The session token is
        resolved server-side to avoid exposing tokens in the client.
        Attempting to revoke the current session returns 400.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/SessionListResponse.yml#/RevokeSessionRequest'
      responses:
        '200':
          description: Session revoked successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/SessionListResponse.yml#/SessionActionResponse'
        '400':
          description: Cannot revoke the current session or validation error
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

    post:
      tags: [User]
      summary: Revoke all other sessions
      description: |
        Revoke all sessions except the current one. Uses POST because the
        action is a bulk destructive operation, not a resource creation.
      security:
        - sessionAuth: []
      responses:
        '200':
          description: All other sessions revoked
          content:
            application/json:
              schema:
                $ref: '../schemas/SessionListResponse.yml#/SessionActionResponse'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/user/password:
    put:
      tags: [User]
      summary: Change user password
      description: Update user password. Requires current password for verification.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/UpdatePasswordRequest.yml#/UpdatePasswordRequest'
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/PasswordUpdateResponse.yml#/PasswordUpdateResponse'
        '400':
          description: Validation error or weak password
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '401':
          description: Invalid old password or unauthorized
          content:
            application/json:
              schema:
                $ref: '../schemas/ErrorResponse.yml#/ErrorResponse'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
