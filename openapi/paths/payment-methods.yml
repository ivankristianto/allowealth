# Payment Methods endpoint paths
paths:
  /api/payment-methods:
    get:
      tags: [Payment Methods]
      summary: List all payment methods
      description: Retrieve all payment methods for the authenticated user
      security:
        - sessionAuth: []
      parameters:
        - name: is_active
          in: query
          description: Filter by active status
          schema:
            type: boolean
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/PaymentMethodsListResponse.yml#/PaymentMethodsListResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    post:
      tags: [Payment Methods]
      summary: Create a new payment method
      description: Create a new payment method
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/CreatePaymentMethodRequest.yml#/CreatePaymentMethodRequest'
      responses:
        '201':
          description: Payment method created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/PaymentMethodResponse.yml#/PaymentMethodResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'

  /api/payment-methods/{id}:
    get:
      tags: [Payment Methods]
      summary: Get a payment method by ID
      description: Retrieve a single payment method by its ID
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '../schemas/PaymentMethodResponse.yml#/PaymentMethodResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    put:
      tags: [Payment Methods]
      summary: Update a payment method
      description: Update an existing payment method
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/UpdatePaymentMethodRequest.yml#/UpdatePaymentMethodRequest'
      responses:
        '200':
          description: Payment method updated successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/PaymentMethodResponse.yml#/PaymentMethodResponse'
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
    delete:
      tags: [Payment Methods]
      summary: Delete a payment method
      description: Soft delete a payment method (marks as inactive)
      security:
        - sessionAuth: []
      parameters:
        - $ref: '../parameters/common.yml#/IdParameter'
      responses:
        '200':
          description: Payment method deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Payment method deleted successfully
        '400':
          $ref: '../responses/common.yml#/BadRequest'
        '401':
          $ref: '../responses/common.yml#/Unauthorized'
        '404':
          $ref: '../responses/common.yml#/NotFound'
        '500':
          $ref: '../responses/common.yml#/InternalServerError'
