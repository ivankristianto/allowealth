# Asset Schema
Asset:
  type: object
  properties:
    id:
      type: string
    name:
      type: string
    type:
      type: string
      enum: [cash, bank_account, e_wallet, mutual_fund, bond, crypto, stock, other, credit_card, loan]
    category_id:
      type: string
      nullable: true
    balance:
      type: string
      pattern: '^\d+(\.\d{1,2})?$'
    currency:
      type: string
      enum: [IDR, USD]
    status:
      type: string
      enum: [active, closed]
      description: Asset lifecycle status
    closed_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the account was closed
    closed_by_user_id:
      type: string
      nullable: true
      description: ID of the user who closed the account
    last_updated:
      type: string
      format: date-time
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
