MfaSetupResponse:
  type: object
  required: [success, data]
  properties:
    success:
      type: boolean
      example: true
    data:
      type: object
      required: [qrCodeDataUrl, manualEntryCode]
      properties:
        qrCodeDataUrl:
          type: string
          description: QR code data URL for authenticator app setup
          example: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...
        manualEntryCode:
          type: string
          description: Base32 secret for manual app entry
          example: JBSWY3DPEHPK3PXP
