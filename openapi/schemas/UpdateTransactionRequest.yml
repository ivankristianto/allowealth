# Update Transaction Request Schema
UpdateTransactionRequest:
  type: object
  properties:
    type:
      type: string
      enum: [expense, income]
    amount:
      type: string
      pattern: '^\d+(\.\d{1,2})?$'
    currency:
      type: string
      enum: [IDR, USD, SGD, PHP, EUR, GBP, MYR, THB, JPY, AUD, KRW, INR]
    category_id:
      type: string
      format: uuid
    payment_method_id:
      type: string
      format: uuid
    transaction_date:
      type: string
      format: date
      description: Transaction date in YYYY-MM-DD format
      example: '2024-01-15'
    description:
      type: string
