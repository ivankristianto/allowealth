# Income report data - detailed income analysis
IncomeReportData:
  type: object
  properties:
    totalIncome:
      type: string
      description: Total income for the period (decimal string)
      example: "9750000"
    incomeBySource:
      type: array
      description: Income breakdown by source category for donut chart
      items:
        type: object
        properties:
          name:
            type: string
            description: Category name
          value:
            type: string
            description: Income amount (decimal string)
        required:
          - name
          - value
    sourceGroups:
      type: array
      description: Income grouped by source type (active/passive/other)
      items:
        type: object
        properties:
          type:
            type: string
            enum: [active, passive, other]
            description: Income source classification
          total:
            type: string
            description: Total income for this source type (decimal string)
          percentage:
            type: number
            description: Percentage of total income
          categories:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                total:
                  type: string
                transactionCount:
                  type: integer
        required:
          - type
          - total
          - percentage
          - categories
    trendData:
      type: array
      description: Income trend data by source type over time
      items:
        type: object
        properties:
          name:
            type: string
            description: Period label
          active:
            type: string
          passive:
            type: string
          other:
            type: string
    history:
      type: object
      description: Paginated income transaction history
      properties:
        transactions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              description:
                type: string
              amount:
                type: string
              date:
                type: string
              categoryName:
                type: string
              memberName:
                type: string
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    memberBreakdown:
      type: array
      description: Per-member income summary
      items:
        type: object
        properties:
          userId:
            type: string
          displayName:
            type: string
          totalIncome:
            type: string
          transactionCount:
            type: integer
          topSource:
            type: string
  required:
    - totalIncome
    - incomeBySource
    - sourceGroups
    - trendData
