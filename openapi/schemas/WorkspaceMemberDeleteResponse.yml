# Workspace Member Delete Response Schema
WorkspaceMemberDeleteResponse:
  allOf:
    - $ref: './ApiErrorResponse.yml#/ApiResponse'
    - type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required:
            - message
          properties:
            message:
              type: string
              description: Success message
              example: "Member removed successfully"
