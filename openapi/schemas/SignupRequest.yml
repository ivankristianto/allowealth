# Signup Request Schema
SignupRequest:
  type: object
  required:
    - email
    - password
    - name
  properties:
    email:
      type: string
      format: email
      description: User email address
      example: user@example.com
    password:
      $ref: './Password.yml#/Password'
    name:
      type: string
      minLength: 1
      maxLength: 255
      description: User display name
      example: John Doe
