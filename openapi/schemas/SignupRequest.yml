# Signup Request Schema
SignupRequest:
  type: object
  required:
    - email
    - password
    - name
  properties:
    email:
      type: string
      format: email
      description: User email address
      example: user@example.com
    password:
      type: string
      minLength: 12
      description: Password must be at least 12 characters, contain a letter, and contain a number or special character
      example: SecurePass123!
    name:
      type: string
      minLength: 1
      maxLength: 255
      description: User display name
      example: John Doe
