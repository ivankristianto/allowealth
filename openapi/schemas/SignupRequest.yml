# Signup Request Schema
SignupRequest:
  type: object
  required:
    - email
    - password
    - name
  properties:
    email:
      type: string
      format: email
      description: User email address
      example: user@example.com
    password:
      $ref: './Password.yml#/Password'
    name:
      type: string
      minLength: 1
      maxLength: 255
      description: User display name
      example: John Doe
    callbackURL:
      type: string
      description: URL to redirect to after sign-up completes
      example: /dashboard
    rememberMe:
      type: boolean
      description: Whether to create a persistent session cookie
      default: false
    invitationToken:
      type: string
      description: Required when `SIGNUP_MODE=invite_only`
    workspaceName:
      type: string
      description: Optional workspace name for self-serve sign-up
    turnstileToken:
      type: string
      description: >
        Cloudflare Turnstile verification token (from cf-turnstile-response widget).
        Optional when Turnstile is not configured.
