# Update Category Request Schema
UpdateCategoryRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
    type:
      type: string
      enum: [expense, income]
    icon:
      type: string
      description: Lucide icon name for the category
    color:
      type: string
      description: Hex color code for the category
    is_active:
      type: boolean
