# Budget Alerts Response Schema
BudgetAlertsResponse:
  allOf:
    - $ref: './ApiErrorResponse.yml#/ApiResponse'
    - type: object
      required: [success, data]
      properties:
        data:
          type: object
          required: [alerts, count]
          properties:
            alerts:
              type: array
              items:
                type: object
                properties:
                  category_id:
                    type: string
                    format: uuid
                  category_name:
                    type: string
                  level:
                    type: string
                    enum: [warning, exceeded]
                  message:
                    type: string
                  budget_amount:
                    type: string
                    pattern: '^\d+(\.\d{1,2})?$'
                  expense_amount:
                    type: string
                    pattern: '^\d+(\.\d{1,2})?$'
                  percentage:
                    type: number
                    format: float
            count:
              type: integer
