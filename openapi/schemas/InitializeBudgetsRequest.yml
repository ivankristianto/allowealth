# Initialize Budgets Request Schema
InitializeBudgetsRequest:
  type: object
  required: [month, year, currency]
  properties:
    month:
      type: integer
      minimum: 1
      maximum: 12
      description: Target month (1-12)
    year:
      type: integer
      minimum: 2000
      maximum: 2100
      description: Target year
    currency:
      type: string
      enum: [IDR, USD]
      description: Currency to filter categories by
  description: |
    Initialize budgets for all active expense categories that don't
    have budgets in the specified month/year. Each new budget is
    created with amount=0.
