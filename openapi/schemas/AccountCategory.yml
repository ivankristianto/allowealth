# Account Category Schema
AccountCategory:
  type: object
  properties:
    id:
      type: string
    name:
      type: string
    description:
      type: string
      nullable: true
      maxLength: 500
    isLiability:
      type: boolean
    isSystem:
      type: boolean
    sortOrder:
      type: integer
    accountCount:
      type: integer
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
