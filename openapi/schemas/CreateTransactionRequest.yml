# Create Transaction Request Schema
CreateTransactionRequest:
  type: object
  required: [type, amount, currency, category_id, payment_method_id, transaction_date]
  properties:
    type:
      type: string
      enum: [expense, income]
    amount:
      type: string
      pattern: '^\d+(\.\d{1,2})?$'
      description: Amount as string (decimal with up to 2 decimal places)
    currency:
      type: string
      enum: [IDR, USD, SGD, PHP, EUR, GBP, MYR, THB, JPY, AUD, KRW, INR]
    category_id:
      type: string
      format: uuid
    payment_method_id:
      type: string
      format: uuid
    transaction_date:
      type: string
      format: date
      description: Transaction date in YYYY-MM-DD format
      example: '2024-01-15'
    description:
      type: string
