# Overview report data - lightweight summary across expense and income
OverviewReportData:
  type: object
  properties:
    totalIncome:
      type: string
      description: Total income for the period (decimal string)
      example: "9750000"
    totalExpenses:
      type: string
      description: Total expenses for the period (decimal string)
      example: "4735000"
    netSavings:
      type: string
      description: Net savings (income - expenses) (decimal string)
      example: "5015000"
    budgetHealth:
      type: number
      description: Budget health percentage (0-100+)
      example: 85.5
    expenseCategories:
      type: integer
      description: Count of categories with expenses
      example: 6
    expenseByCategory:
      type: array
      description: Top expense categories for donut chart
      items:
        $ref: "./CategoryExpense.yml#/CategoryExpense"
    trendData:
      type: array
      description: Financial velocity trend data for bar chart
      items:
        $ref: "./TrendDataPoint.yml#/TrendDataPoint"
    expensePreview:
      type: object
      description: Top expense categories preview for overview
      properties:
        topCategories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              spent:
                type: string
    incomePreview:
      type: object
      description: Income source group preview for overview
      properties:
        sourceGroups:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [active, passive, other]
              total:
                type: string
  required:
    - totalIncome
    - totalExpenses
    - netSavings
    - budgetHealth
    - expenseCategories
    - expenseByCategory
    - trendData
