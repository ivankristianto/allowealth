# Budget Schema
Budget:
  type: object
  required:
    - id
    - category_id
    - month
    - year
    - budget_amount
    - currency
    - is_closed
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    category_id:
      type: string
      format: uuid
    month:
      type: integer
      minimum: 1
      maximum: 12
      description: Month (1-12)
    year:
      type: integer
      minimum: 2000
      maximum: 2100
      description: Year (e.g., 2025, 2026)
    budget_amount:
      type: string
      pattern: '^\d+(\.\d{1,2})?$'
      description: Budget amount as decimal string
    currency:
      type: string
      enum: [IDR, USD]
    is_closed:
      type: boolean
      description: Whether the budget period is closed (locked from edits)
    notes:
      oneOf:
        - type: string
          maxLength: 500
        - type: 'null'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    category_name:
      type: string
      description: Category name (joined from categories table)
    category_icon:
      type: string
      description: Category icon (joined from categories table)
    category_color:
      type: string
      description: Category color (joined from categories table)
