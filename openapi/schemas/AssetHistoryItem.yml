# Asset History Item Schema
AssetHistoryItem:
  type: object
  properties:
    id:
      type: string
      format: uuid
    balance:
      type: string
      pattern: '^\d+(\.\d{1,2})?$'
    notes:
      oneOf:
        - type: string
        - type: 'null'
    recorded_at:
      type: string
      format: date-time
