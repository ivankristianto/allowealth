MfaVerifyLoginRequest:
  type: object
  required: [code]
  properties:
    code:
      type: string
      description: Verification code (TOTP or backup code)
      minLength: 6
      maxLength: 9
      example: '123456'
    isBackupCode:
      type: boolean
      description: Whether the code is a backup code
      default: false
      example: false
