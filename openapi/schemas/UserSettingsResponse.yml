# User Settings Response Schema
UserSettingsResponse:
  allOf:
    - $ref: './ApiErrorResponse.yml#/ApiResponse'
    - type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required:
            - primaryCurrency
            - showConvertedTotals
            - showIndividualCurrencies
          properties:
            primaryCurrency:
              type: string
              enum: [IDR, USD]
              description: Primary currency for displaying totals
            showConvertedTotals:
              type: boolean
              description: Show totals converted to primary currency
            showIndividualCurrencies:
              type: boolean
              description: Show individual currency amounts
