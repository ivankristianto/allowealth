# Create Category Request Schema
CreateCategoryRequest:
  type: object
  required: [name, type]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 255
    type:
      type: string
      enum: [expense, income]
    description:
      type: string
      nullable: true
      maxLength: 200
      description: Optional description of the category
    icon:
      type: string
      description: Lucide icon name for the category
    color:
      type: string
      description: DaisyUI semantic color class for the category
