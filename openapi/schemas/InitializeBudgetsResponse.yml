# Initialize Budgets Response Schema
InitializeBudgetsResponse:
  type: object
  required:
    - success
    - data
  properties:
    success:
      type: boolean
    data:
      type: object
      required:
        - initialized_count
        - categories
      properties:
        initialized_count:
          type: integer
          description: Number of budgets created
        categories:
          type: array
          description: List of categories that were initialized
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: string
                description: Category ID
              name:
                type: string
                description: Category name
