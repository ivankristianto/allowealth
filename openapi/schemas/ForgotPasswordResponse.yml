# Forgot Password Response Schema
ForgotPasswordResponse:
  allOf:
    - $ref: './ApiErrorResponse.yml#/ApiResponse'
    - type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required:
            - message
          properties:
            message:
              type: string
              description: |
                Generic success message. For security reasons, this message is always
                the same regardless of whether the email exists in the system.
              example: If an account exists with this email, we have sent a password reset link. Please check your inbox.
