# Login Request Schema
LoginRequest:
  type: object
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
      description: User email address
      example: user@example.com
    password:
      type: string
      description: |
        User password. Password format validation is enforced during signup
        and password changes, not during login.
      example: mypassword123
    callbackURL:
      type: string
      description: URL to redirect to after sign-in completes
      example: /dashboard
    rememberMe:
      type: boolean
      description: Whether to create a persistent session cookie
      default: false
