# Category transaction detail for drill-down
CategoryTransaction:
  type: object
  properties:
    id:
      type: string
      description: Transaction ID
      example: "txn_123"
    amount:
      type: string
      description: Transaction amount (decimal string for precision)
      example: "150000"
    currency:
      type: string
      enum: [IDR, USD]
      description: Transaction currency
      example: "IDR"
    description:
      type: string
      nullable: true
      description: Transaction description
      example: "Electricity bill"
    transactionDate:
      type: string
      format: date-time
      description: Transaction date
      example: "2024-02-15T10:30:00Z"
    assetName:
      type: string
      description: Asset/account name
      example: "BCA Savings"
  required:
    - id
    - amount
    - currency
    - description
    - transactionDate
    - assetName
