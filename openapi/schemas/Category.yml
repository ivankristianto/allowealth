# Category Schema
Category:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    type:
      type: string
      enum: [expense, income]
    icon:
      type: string
      description: Lucide icon name for the category
    color:
      type: string
      description: Hex color code for the category
    is_active:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
