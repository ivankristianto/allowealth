# Update Password Request Schema
UpdatePasswordRequest:
  type: object
  required:
    - oldPassword
    - newPassword
  properties:
    oldPassword:
      type: string
      minLength: 1
      description: Current password for verification (only checked against stored hash)
      example: SecurePass123!
    newPassword:
      type: string
      minLength: 12
      description: New password must be at least 12 characters, contain a letter, and contain a number or special character
      example: SecurePass123!
