# Workspace Settings Response Schema
WorkspaceSettingsResponse:
  allOf:
    - $ref: './ApiErrorResponse.yml#/ApiResponse'
    - type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required:
            - id
            - name
            - settings
          example:
            id: "ws_123e4567-e89b-12d3-a456-426614174000"
            name: "Family Budget"
            settings:
              currency: "IDR"
              secondaryCurrency: "USD"
              weekStart: "monday"
              compactNumbers: true
              monthlyIncome:
                IDR: "15000000"
              forecastMonthlyTopup: 5000000
              forecastAnnualRate: 7
          properties:
            id:
              type: string
              format: uuid
              description: Workspace ID
              example: "ws_123e4567-e89b-12d3-a456-426614174000"
            name:
              type: string
              description: Workspace display name
              example: "Family Budget"
            settings:
              $ref: './WorkspaceSettings.yml#/WorkspaceSettings'
