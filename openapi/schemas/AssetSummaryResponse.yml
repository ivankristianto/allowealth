# Asset Summary Response Schema
AssetSummaryResponse:
  allOf:
    - $ref: './ApiErrorResponse.yml#/ApiResponse'
    - type: object
      required: [success, data]
      properties:
        data:
          type: object
          required: [by_currency, by_type]
          properties:
            by_currency:
              type: array
              items:
                type: object
                properties:
                  currency:
                    type: string
                    enum: [IDR, USD]
                  total:
                    type: string
                    pattern: '^\d+(\.\d{1,2})?$'
            by_type:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: [bank_account, mutual_fund, bond, crypto, stock, other]
                  total:
                    type: string
                    pattern: '^\d+(\.\d{1,2})?$'
