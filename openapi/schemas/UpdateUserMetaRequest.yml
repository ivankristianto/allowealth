# Update user meta request schema
UpdateUserMetaRequest:
  type: object
  required:
    - value
  properties:
    value:
      type: string
      description: |
        The meta value to set. Must be valid for the key:
        - `currency`: "IDR" or "USD"
        - `show_converted_totals`: "true" or "false"
        - `show_individual_currencies`: "true" or "false"
      minLength: 1
      maxLength: 4096
      example: USD
