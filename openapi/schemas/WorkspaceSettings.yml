# Workspace Settings Schema
WorkspaceSettings:
  type: object
  required:
    - currency
    - secondaryCurrency
    - weekStart
    - compactNumbers
  properties:
    currency:
      type: string
      description: >
        Primary workspace currency. Supported values: IDR, USD, SGD, PHP, EUR, GBP, MYR, THB,
        JPY, AUD, KRW, INR.
      example: "IDR"
    secondaryCurrency:
      type: string
      nullable: true
      description: >
        Optional secondary workspace currency. Must differ from primary currency.
        Null or empty means single-currency mode.
      example: "USD"
    weekStart:
      type: string
      enum: [sunday, monday]
      description: First day of the week for calendar views
      example: "monday"
    compactNumbers:
      type: boolean
      description: Whether to show compact number formatting (e.g., 1.5M instead of 1,500,000)
      example: true
