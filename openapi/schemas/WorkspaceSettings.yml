# Workspace Settings Schema
WorkspaceSettings:
  type: object
  required:
    - currency
    - weekStart
    - compactNumbers
  properties:
    currency:
      type: string
      enum: [IDR, USD]
      description: Default currency for the workspace
      example: "IDR"
    weekStart:
      type: string
      enum: [sunday, monday]
      description: First day of the week for calendar views
      example: "monday"
    compactNumbers:
      type: boolean
      description: Whether to show compact number formatting (e.g., 1.5M instead of 1,500,000)
      example: true
