# Workspace Settings Schema
WorkspaceSettings:
  type: object
  required:
    - currency
    - secondaryCurrency
    - weekStart
    - monthlyIncome
    - forecastMonthlyTopup
    - forecastAnnualRate
  properties:
    currency:
      type: string
      description: >
        Primary workspace currency. Supported values: IDR, USD, SGD, PHP, EUR, GBP, MYR, THB,
        JPY, AUD, KRW, INR.
      example: "IDR"
    secondaryCurrency:
      type: string
      nullable: true
      description: >
        Optional secondary workspace currency. Must differ from primary currency.
        Null or empty means single-currency mode.
      example: "USD"
    weekStart:
      type: string
      enum: [sunday, monday]
      description: First day of the week for calendar views
      example: "monday"
    monthlyIncome:
      type: object
      description: >
        Optional monthly income amounts keyed by currency code. Empty object when not configured.
      additionalProperties:
        type: string
        pattern: '^\d+(\.\d{1,2})?$'
      example:
        IDR: "15000000"
        USD: "250"
    forecastMonthlyTopup:
      type: number
      description: Saved monthly contribution used by the forecast page.
      example: 5000000
    forecastAnnualRate:
      type: number
      description: Saved expected annual percentage yield used by the forecast page.
      example: 7
