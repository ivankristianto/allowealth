# Update Workspace Settings Request Schema
UpdateWorkspaceSettingsRequest:
  type: object
  description: Request body for updating workspace settings. All fields are optional.
  properties:
    name:
      type: string
      description: New workspace name
      minLength: 1
      maxLength: 100
      example: "Family Budget 2025"
    currency:
      type: string
      enum: [IDR, USD]
      description: Default currency for the workspace
      example: "IDR"
    weekStart:
      type: string
      enum: [sunday, monday]
      description: First day of the week for calendar views
      example: "monday"
    compactNumbers:
      type: boolean
      description: Whether to show compact number formatting
      example: true
