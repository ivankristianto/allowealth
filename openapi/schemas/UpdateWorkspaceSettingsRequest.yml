# Update Workspace Settings Request Schema
UpdateWorkspaceSettingsRequest:
  type: object
  description: Request body for updating workspace settings. All fields are optional.
  properties:
    name:
      type: string
      description: New workspace name
      minLength: 1
      maxLength: 100
      example: "Family Budget 2025"
    currency:
      type: string
      description: >
        Primary workspace currency. Supported values: IDR, USD, SGD, PHP, EUR, GBP, MYR, THB,
        JPY, AUD, KRW, INR.
      example: "IDR"
    secondaryCurrency:
      type: string
      nullable: true
      description: >
        Optional secondary currency. Must differ from primary currency.
        Set null or empty string to disable secondary currency.
      example: "USD"
    weekStart:
      type: string
      enum: [sunday, monday]
      description: First day of the week for calendar views
      example: "monday"
    monthlyIncome:
      type: object
      description: >
        Optional monthly income amounts keyed by currency code. Send an empty object to clear it.
      additionalProperties:
        type: string
        pattern: '^\d+(\.\d{1,2})?$'
      example:
        IDR: "15000000"
        USD: "250"
    forecastMonthlyTopup:
      type: number
      minimum: 0
      maximum: 1000000000000
      description: Saved monthly contribution used by the forecast page.
      example: 5000000
    forecastAnnualRate:
      type: number
      minimum: 0
      maximum: 100
      description: Saved expected annual percentage yield used by the forecast page.
      example: 7
