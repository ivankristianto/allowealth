name: Bug Report
description: Report a bug or broken functionality
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What's broken? What did you expect to happen?
      placeholder: 'The budget overview page shows incorrect totals when...'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can this be reproduced?
      placeholder: |
        1. Go to /budget
        2. Add a new expense category
        3. Notice the total is incorrect
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database Dialect
      description: Which database are you using?
      options:
        - SQLite (dev)
        - PostgreSQL/Supabase (prod)
        - Not sure
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, error logs, browser console output, etc.
      placeholder: 'Error in console: TypeError: Cannot read property...'
    validations:
      required: false
