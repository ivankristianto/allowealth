name: Publish Docker Image

on:
  push:
    # Trigger on version tags: v1.0.0, v1.2.3, etc.
    tags:
      - 'v*.*.*'

  # Allow manual dispatch from the GitHub UI for version-tag refs only; non-tag refs fail validation
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Required to push packages to ghcr.io
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate publish ref
        run: |
          case "${GITHUB_REF}" in
            refs/tags/v*.*.*) ;;
            *)
              echo "This workflow only publishes from version tags (refs/tags/v*.*.*)." >&2
              exit 1
              ;;
          esac

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # GITHUB_TOKEN is automatically provided — no extra secrets needed
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/allowealth
          tags: |
            # Tag with the exact version including v prefix: ghcr.io/ivankristianto/allowealth:v1.0.0
            # pattern={{version}} strips the v; pattern=v{{version}} preserves it
            type=semver,pattern=v{{version}}
            # Only move latest on the initial tag push, not manual dispatches or re-runs
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.run_attempt == '1' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # amd64 only for initial release; add linux/arm64 later via QEMU
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up layer rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment Summary
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }} — ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
