name: Deploy to Cloudflare Workers

on:
  # Deploy when pushing to release branch or version tags (e.g., v1.0.0)
  # Usage: git tag v1.0.0 && git push origin v1.0.0
  push:
    branches:
      - release
    tags:
      - 'v*.*.*'

  # Allow manual deployment from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for Cloudflare Workers
        run: bun run build:cloudflare
        env:
          NODE_ENV: production

      - name: Generate wrangler.toml
        run: |
          cat > wrangler.toml << WRANGLER_EOF
          name = "${WORKER_NAME:-allowealth-app}"
          main = "dist/_worker.js/index.js"
          compatibility_date = "2026-02-01"
          compatibility_flags = ["nodejs_compat", "disable_nodejs_process_v2"]

          [assets]
          directory = "./dist"
          binding = "ASSETS"

          [vars]
          NODE_ENV = "production"
          PUBLIC_URL = "${PUBLIC_URL:-https://allowealth.workers.dev}"
          PUBLIC_SITE_URL = "${PUBLIC_SITE_URL:-https://allowealth.io}"
          SIGNUP_MODE = "invite_only"
          CACHE_DRIVER = "upstash"
          PERF_DEBUG = "true"
          LOG_LEVEL = "warn"
          EMAIL_MODE = "real"
          EMAIL_PROVIDER = "resend"
          EMAIL_SENDER_NAME = "Allowealth"
          EMAIL_SENDER_ADDRESS = "noreply@allowealth.io"

          [[d1_databases]]
          binding = "DB"
          database_name = "allowealth-db"
          database_id = "${D1_DATABASE_ID}"

          [observability]
          enabled = true
          head_sampling_rate = 1
          WRANGLER_EOF

          # Add custom domain route if configured
          if [ -n "${CUSTOM_DOMAIN}" ]; then
            sed -i "/^compatibility_flags/a routes = [{ pattern = \"${CUSTOM_DOMAIN}\", custom_domain = true }]" wrangler.toml
          fi
        env:
          WORKER_NAME: ${{ vars.WORKER_NAME }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}

      - name: Get deployment metadata
        id: metadata
        run: |
          # Extract version from git tag or use commit SHA
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            SHA="${{ github.sha }}"
            VERSION="commit-${SHA:0:7}"
          fi

          # Get commit message (first line)
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # Create deployment message
          MESSAGE="Deploy ${VERSION}: ${COMMIT_MSG}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "message=${MESSAGE}" >> $GITHUB_OUTPUT
          echo "Deployment message: ${MESSAGE}"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.metadata.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ steps.metadata.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Worker Name:** ${WORKER_NAME:-allowealth-app}" >> $GITHUB_STEP_SUMMARY
          echo "**App URL:** ${PUBLIC_URL:-https://allowealth.workers.dev}" >> $GITHUB_STEP_SUMMARY
          echo "**Marketing URL:** ${PUBLIC_SITE_URL:-https://allowealth.io}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
        env:
          WORKER_NAME: ${{ vars.WORKER_NAME }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
