name: E2E Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # Allow manual trigger
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create E2E environment file
        run: |
          cp .env.example .env.e2e
          sed -i 's|DATABASE_URL=db/.dev.db|DATABASE_URL=db/.e2e.db|g' .env.e2e
          sed -i 's|PORT=4321|PORT=4320|g' .env.e2e
          echo "" >> .env.e2e
          echo "E2E_USER_EMAIL=demo@example.com" >> .env.e2e
          echo "E2E_USER_PASSWORD=demo123456789" >> .env.e2e
          cp .env.e2e .env

      - name: Setup E2E database
        run: |
          mkdir -p db
          bun run db:push --force
          bun run db:seed

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: e2e/test-results/
          retention-days: 7

  e2e-critical:
    name: Critical Path Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create E2E environment file
        run: |
          cp .env.example .env.e2e
          sed -i 's|DATABASE_URL=db/.dev.db|DATABASE_URL=db/.e2e.db|g' .env.e2e
          sed -i 's|PORT=4321|PORT=4320|g' .env.e2e
          echo "" >> .env.e2e
          echo "E2E_USER_EMAIL=demo@example.com" >> .env.e2e
          echo "E2E_USER_PASSWORD=demo123456789" >> .env.e2e
          cp .env.e2e .env

      - name: Setup E2E database
        run: |
          mkdir -p db
          bun run db:push --force
          bun run db:seed

      - name: Run critical path tests
        run: npx playwright test --config=e2e/playwright.config.ts e2e/tests/business-flow.spec.ts
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: critical-tests-report
          path: e2e/playwright-report/
          retention-days: 7
