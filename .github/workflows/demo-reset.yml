name: Demo Reset

on:
  schedule:
    # Runs daily at 00:00 UTC. Adjust cron expression to change timing.
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI

jobs:
  reset:
    name: Reset demo data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Reset demo data on D1
        # AW_TARGET=d1 + D1_ENABLED=true replaces --target d1 to avoid loadEnvFile('.env.production')
        # which is not present in CI. The D1 HTTP driver reads Cloudflare auth + database IDs from env.
        # PASSWORD_HASHER=pbkdf2 forces the Bun seeder to produce PBKDF2 hashes; Workers cannot verify
        # Argon2id, so without this the reseed leaves the demo unable to sign in.
        # --yes skips the interactive confirmation prompt.
        run: bun run aw demo reset --yes
        env:
          AW_TARGET: d1
          D1_ENABLED: 'true'
          PASSWORD_HASHER: pbkdf2
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
