# Allowealth Docker Compose — self-hosted deployment
# Usage:
#   cp .env.docker.example .env
#   # Edit .env — set every required production value from .env.docker.example
#   # Required: set ALLOWEALTH_VERSION to pin the image tag (e.g., v0.22.3)
#   docker compose up -d
#
# To update:
#   docker compose pull && docker compose up -d

services:
  app:
    # ALLOWEALTH_VERSION must be set in .env — no default to prevent accidental updates
    image: ghcr.io/ivankristianto/allowealth:${ALLOWEALTH_VERSION}
    ports:
      - '3000:3000'
    volumes:
      - allowealth-data:/data
    env_file: .env
    environment:
      # Ensure the standalone server binds on all interfaces inside the container
      # (overrides any DEV_HOST that may have been baked in at build time)
      HOST: '0.0.0.0'
    restart: unless-stopped

volumes:
  allowealth-data:
    # Named volume persists the SQLite database at /data/allowealth.db across
    # container restarts and image updates.
