openapi: 3.1.0
info:
  title: Expenses API
  description: |
    Personal and family financial application API for expense tracking, budgeting,
    account management, and financial forecasting.

    **Authentication:**
    Most endpoints require session-based authentication via HTTP-only session cookies.
    The following endpoints are public (no authentication required):
    - `POST /api/auth/signup`
    - `POST /api/auth/login`
    - `POST /api/auth/login/verify-mfa`
    - `POST /api/auth/forgot-password`
    - `GET /api/auth/verify-email`
    - `POST /api/auth/resend-verification`
    - `GET /api/auth/google`
    - `GET /api/auth/google/callback`
    - `POST /api/auth/google/link`

    **Response Format:**
    All responses follow a standard format:
    ```json
    {
      "success": true|false,
      "data": { ... },    // On success
      "error": {          // On error
        "message": "Error description",
        "code": "ERROR_CODE",
        "details": { ... }
      }
    }
    ```

    **Note:** This OpenAPI specification must be updated whenever API changes are made.
    See openapi/README.md for documentation on the modular structure.
  version: 1.0.0
  contact:
    name: Ivan
    email: ivan@example.com

servers:
  - url: http://localhost:4321
    description: Local development server
  - url: https://expenses.example.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: User
    description: User profile and settings management
  - name: Workspace
    description: Workspace management (settings, members, invitations)
  - name: Transactions
    description: Transaction management (income and expenses)
  - name: Categories
    description: Category management for budgeting
  - name: Accounts
    description: Account tracking and management
  - name: Budget
    description: Budget overview and alerts
  - name: Forecast
    description: Wealth trajectory forecasting and projections
  - name: Reports
    description: Financial intelligence reports (monthly and yearly aggregations)
  - name: Admin
    description: Admin-only endpoints for system monitoring and diagnostics

