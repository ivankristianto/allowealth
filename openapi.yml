openapi: 3.1.0
info:
  title: Expenses API
  description: |
    Personal and family financial application API for expense tracking, budgeting,
    asset management, and financial forecasting.

    **Authentication:**
    All endpoints require session-based authentication. The session token should be
    included in HTTP-only cookies.

    **Response Format:**
    All responses follow a standard format:
    ```json
    {
      "success": true|false,
      "data": { ... },    // On success
      "error": {          // On error
        "message": "Error description",
        "code": "ERROR_CODE",
        "details": { ... }
      }
    }
    ```

    **Note:** This OpenAPI specification must be updated whenever API changes are made.
    See AGENTS.md for workflow guidelines.
  version: 1.0.0
  contact:
    name: Ivan
    email: ivan@example.com

servers:
  - url: http://localhost:4321
    description: Local development server
  - url: https://expenses.example.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Transactions
    description: Transaction management (income and expenses)
  - name: Categories
    description: Category management for budgeting
  - name: Payment Methods
    description: Payment method management
  - name: Assets
    description: Asset tracking and management
  - name: Budget
    description: Budget overview and alerts

paths:
  /api/auth/signup:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: Create a new user account with email, password, and name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Login user
      description: Authenticate user with email and password, creates session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: Session cookie (HTTP-only, secure)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Logout user
      description: Invalidate current session and clear session cookie
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Logout successful
          headers:
            Set-Cookie:
              description: Blank session cookie to clear existing cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/transactions:
    get:
      tags: [Transactions]
      summary: List all transactions
      description: Retrieve paginated list of transactions with optional filters
      security:
        - sessionAuth: []
      parameters:
        - name: type
          in: query
          description: Filter by transaction type
          schema:
            type: string
            enum: [expense, income]
        - name: category_id
          in: query
          description: Filter by category ID
          schema:
            type: string
        - name: payment_method_id
          in: query
          description: Filter by payment method ID
          schema:
            type: string
        - name: currency
          in: query
          description: Filter by currency
          schema:
            type: string
            enum: [IDR, USD]
        - name: start_date
          in: query
          description: Filter by start date (ISO 8601)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Filter by end date (ISO 8601)
          schema:
            type: string
            format: date
        - name: limit
          in: query
          description: Number of results per page (1-100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          description: Number of results to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Transactions]
      summary: Create a new transaction
      description: Create a new income or expense transaction
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get a transaction by ID
      description: Retrieve a single transaction by its ID
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags: [Transactions]
      summary: Update a transaction
      description: Update an existing transaction (all fields optional)
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
      responses:
        '200':
          description: Transaction updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Transactions]
      summary: Delete a transaction
      description: Soft delete a transaction (marks as deleted, doesn't remove record)
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      responses:
        '200':
          description: Transaction deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Transaction deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/transactions/export:
    get:
      tags: [Transactions]
      summary: Export transactions to CSV
      description: Export transactions to CSV file with optional filters. Returns a downloadable CSV file with all matching transactions.
      security:
        - sessionAuth: []
      parameters:
        - name: type
          in: query
          description: Filter by transaction type
          schema:
            type: string
            enum: [expense, income]
        - name: category_id
          in: query
          description: Filter by category ID
          schema:
            type: string
        - name: payment_method_id
          in: query
          description: Filter by payment method ID
          schema:
            type: string
        - name: currency
          in: query
          description: Filter by currency
          schema:
            type: string
            enum: [IDR, USD]
        - name: start_date
          in: query
          description: Filter by start date (ISO 8601)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Filter by end date (ISO 8601)
          schema:
            type: string
            format: date
        - name: search
          in: query
          description: Search in transaction description
          schema:
            type: string
      responses:
        '200':
          description: CSV file generated successfully
          headers:
            Content-Type:
              description: CSV file content type
              schema:
                type: string
                example: text/csv; charset=utf-8
            Content-Disposition:
              description: File download attachment with filename
              schema:
                type: string
                example: 'attachment; filename="transactions_2024-01-15.csv"'
          content:
            text/csv:
              schema:
                type: string
                example: |
                  date,type,amount,currency,category,payment_method,description
                  2024-01-15,expense,50.00,IDR,Food,Cash,Lunch
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/categories:
