  /api/budget/overview:
    get:
      tags: [Budget]
      summary: Get budget overview
      description: Retrieve budget overview for a specific month
      security:
        - sessionAuth: []
      parameters:
        - name: year
          in: query
          description: Year (defaults to current year)
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - name: month
          in: query
          description: Month (1-12, defaults to current month)
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: currency
          in: query
          description: Currency (defaults to IDR)
          schema:
            type: string
            enum: [IDR, USD]
            default: IDR
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetOverviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
