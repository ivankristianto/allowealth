openapi: 3.1.0
info:
  title: Expenses API
  description: |
    Personal and family financial application API for expense tracking, budgeting,
    asset management, and financial forecasting.

    **Authentication:**
    All endpoints require session-based authentication. The session token should be
    included in HTTP-only cookies.

    **Response Format:**
    All responses follow a standard format:
    ```json
    {
      "success": true|false,
      "data": { ... },    // On success
      "error": {          // On error
        "message": "Error description",
        "code": "ERROR_CODE",
        "details": { ... }
      }
    }
    ```

    **Note:** This OpenAPI specification must be updated whenever API changes are made.
    See openapi/README.md for documentation on the modular structure.
  version: 1.0.0
  contact:
    name: Ivan
    email: ivan@example.com

servers:
  - url: http://localhost:4321
    description: Local development server
  - url: https://expenses.example.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: User
    description: User profile and settings management
  - name: Transactions
    description: Transaction management (income and expenses)
  - name: Categories
    description: Category management for budgeting
  - name: Payment Methods
    description: Payment method management
  - name: Assets
    description: Asset tracking and management
  - name: Budget
    description: Budget overview and alerts

paths:
  /api/auth/signup:
    $ref: './openapi/paths/auth.yml#/paths/~1api~1auth~1signup'
  /api/auth/login:
    $ref: './openapi/paths/auth.yml#/paths/~1api~1auth~1login'
  /api/auth/logout:
    $ref: './openapi/paths/auth.yml#/paths/~1api~1auth~1logout'

  /api/user/profile:
    $ref: './openapi/paths/user.yml#/paths/~1api~1user~1profile'
  /api/user/password:
    $ref: './openapi/paths/user.yml#/paths/~1api~1user~1password'
  /api/user/settings:
    $ref: './openapi/paths/user.yml#/paths/~1api~1user~1settings'

  /api/transactions:
    $ref: './openapi/paths/transactions.yml#/paths/~1api~1transactions'
  /api/transactions/{id}:
    $ref: './openapi/paths/transactions.yml#/paths/~1api~1transactions~1{id}'
  /api/transactions/export:
    $ref: './openapi/paths/transactions.yml#/paths/~1api~1transactions~1export'
  /api/transactions/import:
    $ref: './openapi/paths/transactions.yml#/paths/~1api~1transactions~1import'

  /api/categories:
    $ref: './openapi/paths/categories.yml#/paths/~1api~1categories'
  /api/categories/{id}:
    $ref: './openapi/paths/categories.yml#/paths/~1api~1categories~1{id}'

  /api/payment-methods:
    $ref: './openapi/paths/payment-methods.yml#/paths/~1api~1payment-methods'
  /api/payment-methods/{id}:
    $ref: './openapi/paths/payment-methods.yml#/paths/~1api~1payment-methods~1{id}'

  /api/assets:
    $ref: './openapi/paths/assets.yml#/paths/~1api~1assets'
  /api/assets/{id}:
    $ref: './openapi/paths/assets.yml#/paths/~1api~1assets~1{id}'
  /api/assets/{id}/balance:
    $ref: './openapi/paths/assets.yml#/paths/~1api~1assets~1{id}~1balance'
  /api/assets/{id}/history:
    $ref: './openapi/paths/assets.yml#/paths/~1api~1assets~1{id}~1history'
  /api/assets/summary:
    $ref: './openapi/paths/assets.yml#/paths/~1api~1assets~1summary'

  /api/budget/overview:
    $ref: './openapi/paths/budget.yml#/paths/~1api~1budget~1overview'
  /api/budget/alerts:
    $ref: './openapi/paths/budget.yml#/paths/~1api~1budget~1alerts'
  /api/budget/history:
    $ref: './openapi/paths/budget.yml#/paths/~1api~1budget~1history'
  /api/budget/category/{id}/remaining:
    $ref: './openapi/paths/budget.yml#/paths/~1api~1budget~1category~1{id}~1remaining'
  /api/budget/category/{id}:
    $ref: './openapi/paths/budget.yml#/paths/~1api~1budget~1category~1{id}'
  /api/budget/export:
    $ref: './openapi/paths/budget.yml#/paths/~1api~1budget~1export'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: sid
      description: Session-based authentication using HTTP-only cookies

  parameters:
    IdParameter:
      $ref: './openapi/parameters/common.yml#/IdParameter'

  responses:
    BadRequest:
      $ref: './openapi/responses/common.yml#/BadRequest'
    Unauthorized:
      $ref: './openapi/responses/common.yml#/Unauthorized'
    NotFound:
      $ref: './openapi/responses/common.yml#/NotFound'
    InternalServerError:
      $ref: './openapi/responses/common.yml#/InternalServerError'

  schemas:
    ApiErrorResponse:
      $ref: './openapi/schemas/ApiErrorResponse.yml#/ApiResponse'
    ErrorResponse:
      $ref: './openapi/schemas/ErrorResponse.yml#/ErrorResponse'

    # Authentication Schemas
    Password:
      $ref: './openapi/schemas/Password.yml#/Password'
    SignupRequest:
      $ref: './openapi/schemas/SignupRequest.yml#/SignupRequest'
    LoginRequest:
      $ref: './openapi/schemas/LoginRequest.yml#/LoginRequest'
    AuthSuccessResponse:
      $ref: './openapi/schemas/AuthSuccessResponse.yml#/AuthSuccessResponse'

    # User Schemas
    UpdateUserProfileRequest:
      $ref: './openapi/schemas/UpdateUserProfileRequest.yml#/UpdateUserProfileRequest'
    UserProfileResponse:
      $ref: './openapi/schemas/UserProfileResponse.yml#/UserProfileResponse'
    UpdatePasswordRequest:
      $ref: './openapi/schemas/UpdatePasswordRequest.yml#/UpdatePasswordRequest'
    PasswordUpdateResponse:
      $ref: './openapi/schemas/PasswordUpdateResponse.yml#/PasswordUpdateResponse'
    UpdateUserSettingsRequest:
      $ref: './openapi/schemas/UpdateUserSettingsRequest.yml#/UpdateUserSettingsRequest'
    UserSettingsResponse:
      $ref: './openapi/schemas/UserSettingsResponse.yml#/UserSettingsResponse'

    # Transaction Schemas
    Transaction:
      $ref: './openapi/schemas/Transaction.yml#/Transaction'
    CreateTransactionRequest:
      $ref: './openapi/schemas/CreateTransactionRequest.yml#/CreateTransactionRequest'
    UpdateTransactionRequest:
      $ref: './openapi/schemas/UpdateTransactionRequest.yml#/UpdateTransactionRequest'
    TransactionResponse:
      $ref: './openapi/schemas/TransactionResponse.yml#/TransactionResponse'
    TransactionsListResponse:
      $ref: './openapi/schemas/TransactionsListResponse.yml#/TransactionsListResponse'
    TransactionImportResult:
      $ref: './openapi/schemas/TransactionImportResult.yml#/TransactionImportResult'

    # Category Schemas
    Category:
      $ref: './openapi/schemas/Category.yml#/Category'
    CreateCategoryRequest:
      $ref: './openapi/schemas/CreateCategoryRequest.yml#/CreateCategoryRequest'
    UpdateCategoryRequest:
      $ref: './openapi/schemas/UpdateCategoryRequest.yml#/UpdateCategoryRequest'
    CategoryResponse:
      $ref: './openapi/schemas/CategoryResponse.yml#/CategoryResponse'
    CategoriesListResponse:
      $ref: './openapi/schemas/CategoriesListResponse.yml#/CategoriesListResponse'

    # Payment Method Schemas
    PaymentMethod:
      $ref: './openapi/schemas/PaymentMethod.yml#/PaymentMethod'
    CreatePaymentMethodRequest:
      $ref: './openapi/schemas/CreatePaymentMethodRequest.yml#/CreatePaymentMethodRequest'
    UpdatePaymentMethodRequest:
      $ref: './openapi/schemas/UpdatePaymentMethodRequest.yml#/UpdatePaymentMethodRequest'
    PaymentMethodResponse:
      $ref: './openapi/schemas/PaymentMethodResponse.yml#/PaymentMethodResponse'
    PaymentMethodsListResponse:
      $ref: './openapi/schemas/PaymentMethodsListResponse.yml#/PaymentMethodsListResponse'

    # Asset Schemas
    Asset:
