openapi: 3.1.0
info:
  title: Expenses API
  description: |
    Personal and family financial application API for expense tracking, budgeting,
    asset management, and financial forecasting.

    **Authentication:**
    All endpoints require session-based authentication. The session token should be
    included in HTTP-only cookies.

    **Response Format:**
    All responses follow a standard format:
    ```json
    {
      "success": true|false,
      "data": { ... },    // On success
      "error": {          // On error
        "message": "Error description",
        "code": "ERROR_CODE",
        "details": { ... }
      }
    }
    ```

    **Note:** This OpenAPI specification must be updated whenever API changes are made.
    See openapi/README.md for documentation on the modular structure.
  version: 1.0.0
  contact:
    name: Ivan
    email: ivan@example.com

servers:
  - url: http://localhost:4321
    description: Local development server
  - url: https://expenses.example.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: User
    description: User profile and settings management
  - name: Workspace
    description: Workspace management (settings, members, invitations)
  - name: Transactions
    description: Transaction management (income and expenses)
  - name: Categories
    description: Category management for budgeting
  - name: Assets
    description: Asset tracking and management
  - name: Budget
    description: Budget overview and alerts
  - name: Forecast
    description: Wealth trajectory forecasting and projections
  - name: Reports
    description: Financial intelligence reports (monthly and yearly aggregations)

