  /api/budget/category/{id}/remaining:
    get:
      tags: [Budget]
      summary: Get category remaining budget
      description: Retrieve remaining budget for a specific category in current month
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParameter'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryRemainingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/budget/export:
    get:
      tags: [Budget]
      summary: Export budget overview to CSV
      description: Export budget overview for a specific month to CSV file with category breakdowns.
      security:
        - sessionAuth: []
      parameters:
        - name: year
          in: query
          description: Year (defaults to current year)
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
        - name: month
          in: query
          description: Month (1-12, defaults to current month)
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: currency
          in: query
          description: Currency (defaults to IDR)
          schema:
            type: string
            enum: [IDR, USD]
            default: IDR
      responses:
        '200':
          description: CSV file generated successfully
          headers:
            Content-Type:
              description: CSV file content type
              schema:
                type: string
                example: text/csv; charset=utf-8
            Content-Disposition:
              description: File download attachment with filename
              schema:
                type: string
                example: 'attachment; filename="budget_2024_Jan.csv"'
          content:
            text/csv:
              schema:
                type: string
                example: |
                  category_name,budget_amount,expense_amount,balance,percentage,status
                  Food,5000000.00,3500000.00,1500000.00,70.0,ok
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: sid
      description: Session-based authentication using HTTP-only cookies

  parameters:
    IdParameter:
      name: id
      in: path
      required: true
      description: Resource ID (UUID)
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request - validation error or invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          description: Response data (present on success)
        error:
          type: object
          description: Error details (present on failure)
          properties:
            message:
              type: string
            code:
              type: string
            details:
              type: object

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, error]
          properties:
            success:
              type: boolean
              example: false
            error:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                code:
                  type: string
                details:
                  type: object

    # Authentication Schemas
    SignupRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: user@example.com
        password:
          type: string
          minLength: 12
          description: Password (min 12 characters, letters + numbers/special chars)
          example: SecurePassword123!
          pattern: '^(?=.*[A-Za-z])(?=.*[0-9!@#$%^&*()_+\-=\[\]{};'"\\|,.<>\/?]).{12,}$'
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: User display name
          example: John Doe

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: user@example.com
        password:
          type: string
          description: User password
          example: SecurePassword123!

    AuthSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required:
            - success
            - data
          properties:
            success:
              type: boolean
              example: true
            data:
              type: object
              required:
                - user
              properties:
                user:
                  type: object
                  required:
                    - id
                    - email
                    - name
                  properties:
                    id:
                      type: string
                      format: uuid
                      description: User ID
                    email:
                      type: string
                      format: email
                      description: User email address
                    name:
                      type: string
                      description: User display name

    # Transaction Schemas
    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [expense, income]
        amount:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          description: Amount as string (decimal with up to 2 decimal places)
        currency:
          type: string
          enum: [IDR, USD]
        category_id:
          type: string
          format: uuid
        payment_method_id:
          type: string
          format: uuid
        transaction_date:
          type: string
          format: date-time
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTransactionRequest:
      type: object
      required: [type, amount, currency, category_id, payment_method_id, transaction_date]
      properties:
        type:
          type: string
          enum: [expense, income]
        amount:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          description: Amount as string (decimal with up to 2 decimal places)
        currency:
          type: string
          enum: [IDR, USD]
        category_id:
          type: string
          format: uuid
        payment_method_id:
          type: string
          format: uuid
        transaction_date:
          type: string
          format: date
          description: Transaction date in YYYY-MM-DD format
          example: "2024-01-15"
        description:
          type: string

    UpdateTransactionRequest:
      type: object
      properties:
        type:
          type: string
          enum: [expense, income]
        amount:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        currency:
          type: string
          enum: [IDR, USD]
        category_id:
          type: string
          format: uuid
        payment_method_id:
          type: string
          format: uuid
        transaction_date:
          type: string
          format: date
          description: Transaction date in YYYY-MM-DD format
          example: "2024-01-15"
        description:
          type: string

    TransactionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              $ref: '#/components/schemas/Transaction'

    TransactionsListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              type: object
              required: [transactions, pagination]
              properties:
                transactions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Transaction'
                pagination:
                  type: object
                  required: [limit, offset, total]
                  properties:
                    limit:
                      type: integer
                    offset:
                      type: integer
                    total:
                      type: integer

    # Category Schemas
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [expense, income]
        percentage:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          nullable: true
        budget_amount:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          nullable: true
        currency:
          type: string
          enum: [IDR, USD]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCategoryRequest:
      type: object
      required: [name, type, currency]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        type:
          type: string
          enum: [expense, income]
        currency:
          type: string
          enum: [IDR, USD]
        percentage:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        budget_amount:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        type:
          type: string
          enum: [expense, income]
        currency:
          type: string
          enum: [IDR, USD]
        percentage:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        budget_amount:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        is_active:
          type: boolean

    CategoryResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              $ref: '#/components/schemas/Category'

    CategoriesListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Category'

    # Payment Method Schemas
    PaymentMethod:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [cash, credit_card, debit_card, bank_transfer, e_wallet]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePaymentMethodRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        type:
          type: string
          enum: [cash, credit_card, debit_card, bank_transfer, e_wallet]

    UpdatePaymentMethodRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        type:
          type: string
          enum: [cash, credit_card, debit_card, bank_transfer, e_wallet]
        is_active:
          type: boolean

    PaymentMethodResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              $ref: '#/components/schemas/PaymentMethod'

    PaymentMethodsListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/PaymentMethod'

    # Asset Schemas
    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [bank_account, mutual_fund, bond, crypto, stock, other]
        balance:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        currency:
          type: string
          enum: [IDR, USD]
        last_updated:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAssetRequest:
      type: object
      required: [name, type, balance, currency]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        type:
          type: string
          enum: [bank_account, mutual_fund, bond, crypto, stock, other]
        balance:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        currency:
          type: string
          enum: [IDR, USD]

    UpdateAssetRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        type:
          type: string
          enum: [bank_account, mutual_fund, bond, crypto, stock, other]
        currency:
          type: string
          enum: [IDR, USD]

    UpdateAssetBalanceRequest:
      type: object
      required: [balance]
      properties:
        balance:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        notes:
          type: string

    AssetResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              $ref: '#/components/schemas/Asset'

    AssetsListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Asset'

    AssetHistoryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        balance:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
        notes:
          type: string
          nullable: true
        recorded_at:
          type: string
          format: date-time

    AssetHistoryListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AssetHistoryItem'

    AssetSummaryResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              type: object
              required: [by_currency, by_type]
              properties:
                by_currency:
                  type: array
                  items:
                    type: object
                    properties:
                      currency:
                        type: string
                        enum: [IDR, USD]
                      total:
                        type: string
                        pattern: '^\d+(\.\d{1,2})?$'
                by_type:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [bank_account, mutual_fund, bond, crypto, stock, other]
                      total:
                        type: string
                        pattern: '^\d+(\.\d{1,2})?$'

    # Budget Schemas
    BudgetOverviewResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              type: object
              required: [categories, totals]
              properties:
                categories:
                  type: array
                  items:
                    type: object
                    properties:
                      category_id:
                        type: string
                        format: uuid
                      category_name:
                        type: string
                      budget_amount:
                        type: string
                        pattern: '^\d+(\.\d{1,2})?$'
                      expense_amount:
                        type: string
                        pattern: '^\d+(\.\d{1,2})?$'
                      balance:
                        type: string
                        pattern: '^\d+(\.\d{1,2})?$'
                      percentage:
                        type: number
                        format: float
                      status:
                        type: string
                        enum: [ok, warning, exceeded]
                totals:
                  type: object
                  properties:
                    total_budget:
                      type: string
                      pattern: '^\d+(\.\d{1,2})?$'
                    total_expense:
                      type: string
                      pattern: '^\d+(\.\d{1,2})?$'
                    total_balance:
                      type: string
                      pattern: '^\d+(\.\d{1,2})?$'
                    budget_percentage:
                      type: number
                      format: float

    BudgetAlertsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              type: object
              required: [alerts, count]
              properties:
                alerts:
                  type: array
                  items:
                    type: object
                    properties:
                      category_id:
                        type: string
                        format: uuid
                      category_name:
                        type: string
                      level:
                        type: string
                        enum: [warning, exceeded]
                      message:
                        type: string
                      budget_amount:
                        type: string
                        pattern: '^\d+(\.\d{1,2})?$'
                      expense_amount:
                        type: string
                        pattern: '^\d+(\.\d{1,2})?$'
                      percentage:
                        type: number
                        format: float
                count:
                  type: integer

    CategoryRemainingResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [success, data]
          properties:
            data:
              type: object
              required: [category_id, remaining, budget_amount, expense_amount]
              properties:
                category_id:
                  type: string
                  format: uuid
                budget_amount:
                  type: string
                  pattern: '^\d+(\.\d{1,2})?$'
                expense_amount:
                  type: string
                  pattern: '^\d+(\.\d{1,2})?$'
                remaining:
                  type: string
                  pattern: '^\d+(\.\d{1,2})?$'
                percentage:
                  type: number
                  format: float
